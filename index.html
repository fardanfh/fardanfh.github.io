<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chainway C72 Web RFID</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .instruction { text-align: center; color: #777; font-size: 14px; margin-bottom: 15px; }
        
        /* Menggunakan Textarea agar Android tidak menghentikan input beruntun */
        #rfidInput { 
            width: 100%; 
            height: 80px; 
            padding: 12px; 
            font-size: 16px; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
            border: 2px solid #28a745; 
            border-radius: 6px; 
            outline: none;
            resize: none;
            background-color: #fdfdfd;
        }
        #rfidInput:focus { background-color: #eef6ff; border-color: #007bff; }
        
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: #555; }
        button { padding: 8px 12px; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #c82333; }
        
        #tagList { list-style-type: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; }
        #tagList li { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 15px; color: #333; }
        #tagList li:nth-child(even) { background-color: #fcfcfc; }
        #tagList li:last-child { border-bottom: none; }
        .time-badge { background: #007bff; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Scanner Massal C72</h2>
        <p class="instruction">Tekan pelatuk 1x. Scanner akan mengisi kotak di bawah ini secara massal.</p>

        <textarea id="rfidInput" placeholder="Kursor harus di sini... Scanner akan memborbardir teks ke kotak ini." autofocus></textarea>

        <div class="header-action">
            <span>Total Unik: <span id="totalTags" style="color: #28a745; font-size: 20px;">0</span></span>
            <button onclick="clearList()">Reset Data</button>
        </div>

        <ul id="tagList"></ul>
    </div>

    <script>
        const rfidInput = document.getElementById('rfidInput');
        const tagList = document.getElementById('tagList');
        const totalTagsDisplay = document.getElementById('totalTags');

        let scannedTags = new Set();
        let processTimeout;

        // Mendengarkan perubahan pada textarea
        rfidInput.addEventListener('input', function() {
            // Tunggu sampai scanner "berhenti menembak" selama 300 milidetik
            // agar web tidak hang saat diserang ratusan tag sekaligus
            clearTimeout(processTimeout);
            
            processTimeout = setTimeout(() => {
                processBulkData(rfidInput.value);
                rfidInput.value = ''; // Bersihkan kotak textarea setelah data dipindah ke list bawah
            }, 300); 
        });

        function processBulkData(rawData) {
            if (!rawData.trim()) return;

            // Pisahkan data berdasarkan "Enter" (\n) atau spasi
            const incomingTags = rawData.split(/[\n\r,\s]+/);
            const fragment = document.createDocumentFragment();
            let hasNewTags = false;
            const now = new Date().toLocaleTimeString('id-ID');

            incomingTags.forEach(tag => {
                const cleanTag = tag.trim();
                
                // Mencegah masuknya tag kosong dan tag duplikat
                if (cleanTag !== "" && !scannedTags.has(cleanTag)) {
                    scannedTags.add(cleanTag);
                    hasNewTags = true;

                    const li = document.createElement('li');
                    li.textContent = cleanTag;

                    const timeBadge = document.createElement('span');
                    timeBadge.textContent = now;
                    timeBadge.className = 'time-badge';
                    li.appendChild(timeBadge);

                    fragment.prepend(li); // Susun yang terbaru di atas
                }
            });

            // Update UI
            if (hasNewTags) {
                tagList.insertBefore(fragment, tagList.firstChild);
                totalTagsDisplay.textContent = scannedTags.size;
            }
        }

        // Auto focus menjaga kursor tetap di textarea
        document.addEventListener('click', function(event) {
            if (event.target.tagName !== 'BUTTON') {
                rfidInput.focus();
            }
        });

        function clearList() {
            if(confirm("Hapus semua data?")) {
                scannedTags.clear();
                tagList.innerHTML = '';
                totalTagsDisplay.textContent = '0';
                rfidInput.focus();
            }
        }
    </script>
</body>
</html>
